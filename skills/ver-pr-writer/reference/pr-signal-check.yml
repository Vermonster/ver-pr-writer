name: PR Signal Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-signals:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check required PR sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const required = [
              "## Intent",
              "## Mental model",
              "## What changed",
              "## Risk signals",
              "## Evidence / validation",
              "## Review targeting",
              "## Operations",
              "## Uncertainty / judgment calls"
            ];

            const missing = required.filter(section => !body.includes(section));

            if (missing.length) {
              core.setFailed(
                "Missing required PR signal sections:\n- " + missing.join("\n- ")
              );
            } else {
              core.info("All required PR signal sections are present.");
            }
